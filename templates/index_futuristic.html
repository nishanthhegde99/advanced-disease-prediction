<!DOCTYPE html>
<html>
<head>
    <title>AI Disease Prediction - Futuristic Health Scanner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/futuristic.css">
</head>
<body>
    <!-- Scan Line Effect -->
    <div class="scan-line"></div>
    
    <!-- Floating Particles -->
    <div class="particles" id="particles"></div>
    
    <div style="max-width: 1400px; margin: 0 auto; padding: 20px; position: relative; z-index: 1;">
        
        <!-- Header -->
        <div class="glass-container" style="text-align: center; margin-bottom: 30px;">
            <h1 class="neon-text" style="font-size: 56px; margin-bottom: 10px; letter-spacing: 3px;">
                🤖 AI HEALTH SCANNER
            </h1>
            <p style="color: #00f3ff; font-size: 20px; font-weight: 300; letter-spacing: 2px;">
                NEXT-GENERATION DISEASE PREDICTION SYSTEM
            </p>
        </div>

        <!-- Stats Grid -->
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px;">
            <div class="stat-card">
                <div class="stat-number">100</div>
                <p style="color: #fff; font-size: 18px; margin-top: 10px; letter-spacing: 1px;">DISEASES</p>
            </div>
            <div class="stat-card" style="animation-delay: 0.2s;">
                <div class="stat-number">50</div>
                <p style="color: #fff; font-size: 18px; margin-top: 10px; letter-spacing: 1px;">SYMPTOMS</p>
            </div>
            <div class="stat-card" style="animation-delay: 0.4s;">
                <div class="stat-number">35</div>
                <p style="color: #fff; font-size: 18px; margin-top: 10px; letter-spacing: 1px;">MEDICINES</p>
            </div>
            <div class="stat-card" style="animation-delay: 0.6s;">
                <div class="stat-number">5</div>
                <p style="color: #fff; font-size: 18px; margin-top: 10px; letter-spacing: 1px;">AI MODELS</p>
            </div>
        </div>

        <!-- Main Scanner Interface -->
        <div class="glass-container">
            <h2 style="color: #00f3ff; font-family: 'Orbitron', sans-serif; font-size: 32px; margin-bottom: 20px; text-align: center;">
                SYMPTOM SCANNER INTERFACE
            </h2>
            
            <!-- Search Box -->
            <div style="position: relative; margin-bottom: 30px;">
                <input type="text" id="search" placeholder="🔍 SEARCH SYMPTOMS..." 
                    style="width: 100%; padding: 20px; font-size: 18px; background: rgba(0, 243, 255, 0.1); 
                    border: 2px solid rgba(0, 243, 255, 0.3); border-radius: 15px; color: #fff; 
                    font-family: 'Rajdhani', sans-serif; letter-spacing: 1px; transition: all 0.3s;">
            </div>

            <form method="POST" action="/predict" id="symptomForm">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3 style="color: #fff; font-size: 24px; font-family: 'Orbitron', sans-serif;">
                        SELECT SYMPTOMS
                    </h3>
                    <div id="count" style="padding: 10px 25px; background: linear-gradient(135deg, #00f3ff, #ff00ff); 
                        border-radius: 20px; font-weight: 700; color: #000; font-size: 16px; letter-spacing: 1px;">
                        0 / 5 SELECTED
                    </div>
                </div>

                <div id="symptomsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
                    gap: 15px; margin-bottom: 30px; max-height: 500px; overflow-y: auto; padding: 10px;">
                    {% for s in symptoms %}
                    <div class="holo-card symptom-card" data-name="{{ s[1] }}" style="padding: 20px;">
                        <input type="checkbox" name="symptom" value="{{ s[0] }}" id="symptom-{{ s[0] }}" 
                            style="display: none;">
                        <label for="symptom-{{ s[0] }}" style="cursor: pointer; color: #fff; font-size: 16px; 
                            font-weight: 500; letter-spacing: 1px; display: block;">
                            {{ s[1] }}
                        </label>
                    </div>
                    {% endfor %}
                </div>

                <div id="noResults" style="display: none; text-align: center; padding: 40px; color: #00f3ff; 
                    font-size: 18px; letter-spacing: 1px;">
                    NO SYMPTOMS FOUND
                </div>

                <button type="submit" class="cyber-btn" id="submitBtn" disabled 
                    style="width: 100%; padding: 20px; font-size: 20px; margin-top: 20px;">
                    🔬 INITIATE AI ANALYSIS
                </button>
                
                <div id="loading" style="display: none; text-align: center; margin-top: 20px;">
                    <div class="cyber-loader" style="margin: 0 auto;"></div>
                    <p style="color: #00f3ff; margin-top: 15px; font-size: 16px; letter-spacing: 2px;">
                        AI PROCESSING...
                    </p>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Create floating particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 20 + 's';
            particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
            particlesContainer.appendChild(particle);
        }

        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        const submitBtn = document.getElementById('submitBtn');
        const countSpan = document.getElementById('count');
        const searchInput = document.getElementById('search');
        const symptomCards = document.querySelectorAll('.symptom-card');
        const noResults = document.getElementById('noResults');
        const symptomsGrid = document.getElementById('symptomsGrid');
        const MAX_SYMPTOMS = 5;

        // Search input glow effect
        searchInput.addEventListener('focus', function() {
            this.style.borderColor = '#00f3ff';
            this.style.boxShadow = '0 0 20px rgba(0, 243, 255, 0.5)';
        });

        searchInput.addEventListener('blur', function() {
            this.style.borderColor = 'rgba(0, 243, 255, 0.3)';
            this.style.boxShadow = 'none';
        });

        function updateCount() {
            const count = document.querySelectorAll('input[type="checkbox"]:checked').length;
            countSpan.textContent = count + ' / 5 SELECTED';
            submitBtn.disabled = count === 0;
            
            if (count >= MAX_SYMPTOMS) {
                countSpan.style.background = 'linear-gradient(135deg, #ff0000, #ff00ff)';
            } else if (count >= 3) {
                countSpan.style.background = 'linear-gradient(135deg, #ffaa00, #ff00ff)';
            } else {
                countSpan.style.background = 'linear-gradient(135deg, #00f3ff, #ff00ff)';
            }
            
            checkboxes.forEach(cb => {
                if (!cb.checked) {
                    cb.disabled = count >= MAX_SYMPTOMS;
                    const card = cb.closest('.symptom-card');
                    card.style.opacity = count >= MAX_SYMPTOMS ? '0.3' : '1';
                    card.style.cursor = count >= MAX_SYMPTOMS ? 'not-allowed' : 'pointer';
                }
            });
        }

        checkboxes.forEach(checkbox => {
            checkbox.addEventListener('change', function() {
                const card = this.closest('.symptom-card');
                if (this.checked) {
                    card.style.background = 'linear-gradient(135deg, rgba(0, 243, 255, 0.3), rgba(255, 0, 255, 0.3))';
                    card.style.borderColor = '#00f3ff';
                    card.style.boxShadow = '0 0 30px rgba(0, 243, 255, 0.5)';
                } else {
                    card.style.background = 'linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05))';
                    card.style.borderColor = 'rgba(255,255,255,0.2)';
                    card.style.boxShadow = 'none';
                }
                updateCount();
            });
        });

        symptomCards.forEach(card => {
            card.addEventListener('click', function(e) {
                if (e.target.tagName !== 'INPUT') {
                    const checkbox = this.querySelector('input[type="checkbox"]');
                    if (checkbox.disabled && !checkbox.checked) return;
                    checkbox.checked = !checkbox.checked;
                    checkbox.dispatchEvent(new Event('change'));
                }
            });
        });

        searchInput.addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase();
            let visibleCount = 0;

            symptomCards.forEach(card => {
                const symptomName = card.dataset.name.toLowerCase();
                if (symptomName.includes(searchTerm)) {
                    card.style.display = 'block';
                    visibleCount++;
                } else {
                    card.style.display = 'none';
                }
            });

            if (visibleCount === 0) {
                symptomsGrid.style.display = 'none';
                noResults.style.display = 'block';
            } else {
                symptomsGrid.style.display = 'grid';
                noResults.style.display = 'none';
            }
        });

        document.getElementById('symptomForm').addEventListener('submit', function() {
            document.getElementById('loading').style.display = 'block';
            submitBtn.disabled = true;
            submitBtn.textContent = 'ANALYZING...';
        });
    </script>
</body>
</html>
